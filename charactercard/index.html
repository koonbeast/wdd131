<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card — WDD 131</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

    <!-- Primary description for search engines -->
    <meta name="description" content="Interactive character card project for WDD 131 for fighting monsters.">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card — WDD 131">
    <meta property="og:description" content="An interactive character card project for WDD 131 for fighting monsters.">
    <meta property="og:url" content="https://koonbeast.github.io/wdd131/charactercard/">
    <meta property="og:image" content="https://koonbeast.github.io/wdd131/charactercard/card_images/snortleblat.webp">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card — WDD 131">
    <meta name="twitter:description" content="Interactive character card project for WDD 131 for fighting monsters.">
    <meta name="twitter:image" content="https://koonbeast.github.io/wdd131/charactercard/card_images/snortleblat.webp">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
</head>
<body>
    <main>
        <div class="card">
            <img class="image" src="card_images/snortleblat.webp" alt="Humanoid crocodile swamp monster">
            <p class="name">Snortleblat</p>
            <section class="stats">
                <!-- javascript -->
            </section>
            <section class="buttons">
                <button class="attacked">Attacked</button>
                <button class="levelUp">Level Up</button>                
            </section>
        </div>
    </main>
</body>
</html>
