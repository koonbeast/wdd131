<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recepies - Flexbox Prove Assignment">
    <meta property="og:description" content="Find delicious recepies and see their ratings among the community.">
    <meta property="og:url" content="https://koonbeast.github.io/wdd131/recipes/index.html">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recepies - Flexbox Prove Assignment">
    <meta name="twitter:description" content="Find delicious recepies and see their ratings among the community.">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepies - Flexbox Prove Assignment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main>
        <section id="title">
            <img src="images/recipe-book.png" alt="logo recipe book">
            <h1 class="amatic-sc-bold">RecipeBook</h1>
        </section>
        
        <section id="search-area">
            <form action="#">
                <input type="text" placeholder="Find a recipe" name="search" id="search">
                <button type="submit">
                    <img src="images/search.svg" alt="search icon">
                </button>
            </form>
        </section>
        

        <div class="recipe-card">

            <img src="images/apple-crisp.jpg" alt="desert of apples crisp and ice-cream in a bowl">
            <button>dessert</button>
            <h2 class="amatic-sc-bold">APPLE CRISP</h2>


        
            <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
            >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
                
        </div>

        
        
    </main>
    
    <footer>


        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  

        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>


    </footer>

</body>
</html>
