<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Steven Koon">

    <!-- Primary description for search engines -->
    <meta name="description" content="Save songs when not all platforms have everything you want available.">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Song Saver">
    <meta property="og:description" content="Save songs when not all platforms have everything you want available.">
    <meta property="og:url" content="https://koonbeast.github.io/wdd131/unnamed_final_project/index.html">
    <meta property="og:image" content="https://koonbeast.github.io/wdd131/unnamed_final_project/images/logo.jpg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Song Saver">
    <meta name="twitter:description" content="Save songs when not all platforms have everything you want available.">
    <meta name="twitter:image" content="https://koonbeast.github.io/wdd131/unnamed_final_project/images/logo.jpg">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

    <title>Song Saver</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="logoContainer">
            <img src="images/logo.jpg" alt="song saver logo">
        </div>
        <div>
            <h1>Song Saver</h1>
            <h2>Start saving songs!</h2>
        </div>
    </header>
    <main>

        <div id="full">

            <section id="songInput">
                <form action="">
                    <div>
                        <input type="file" name="imageUpload" id="imageUpload" accept="image/*">
                        <label for="imageUpload">- Image</label>
                    </div>
                    <div>
                        <input type="text" name="artist" id="artist" required>
                        <label for="artist">- Artist</label>
                    </div>
                    <div>
                        <input type="text" name="name" id="name">
                        <label for="name">- Song Name</label>
                    </div>
                    <div>
                        <input type="text" name="featured" id="featured">
                        <label for="featured">- Featured Artist</label>
                    </div>
                    <div>
                        <input type="text" name="coverArtist" id="coverArtist">
                        <label for="coverArtist">- Cover Artist</label>
                    </div>
                    <div>
                        <input type="text" name="notesOther" id="notesOther">
                        <label for="notesOther">- Notes</label>
                    </div>
                    <div>
                        <input type="text" name="tags" id="tags">
                        <label for="tags">- Tags (seperate by ", ")</label>
                    </div>
                    <button>Save Song</button>
                </form>
            </section>

            <section id="filter">
                <div id="filterDropdown">
                    <label for="filterField">Filter by</label>
                    <select id="filterField" name="filterField">
                        <option value="all">All Fields</option>
                        <option value="artist">Artist</option>
                        <option value="name">Song Name</option>
                        <option value="featured">Featured Artist</option>
                        <option value="coverArtist">Cover Artist</option>
                        <option value="notesOther">Notes</option>
                        <option value="tags">Tags</option>
                    </select>
                </div>
                <div id="filterText">
                    <label for="FilterInputField" hidden>Filter songs</label>
                    <input type="text" id="FilterInputField" placeholder="Filter songs..." aria-label="Filter songs">
                    <button>Filter</button>
                </div>
                <div id="activeFilters">
                    <p>Active Filters:</p>
                    <section id="activeFiltersDisplayed"></section>
                </div>
            </section>

            <section id="list">

                <div class="row">
                    <section class="visual">
                        <img src="" alt="song-represented or album image">
                    </section>
                    <section class="dataEntry">
                        <p>{artist}</p>
                        <p>- {name}</p>
                        <p>(ft. {secondary artist})</p>
                        <p>({cover artist remix})</p>
                        <p>[note]</p>
                        <p>"{tag} {tag} {tag}"</p>
                    </section>
                    <section class="permanentDelete">
                        <button class="delete">x</button>
                    </section>
                </div>

            </section>

        </div>

        <div id="toggle">
            <p>WARNING - Toggle songs to be deleted from your list ></p>
            <button id="toggleDelete">x</button>
        </div>
        
    </main>
    <footer></footer>
</body>
</html>
